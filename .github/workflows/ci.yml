name: CI

Define quando o CI vai rodar (ao dar push ou abrir Pull Request na branch main)
on: push: branches: [ main ] pull_request: branches: [ main ]

jobs: test: runs-on: ubuntu-latest


# Testa o seu código em diferentes versões do Python para garantir compatibilidade
strategy:
  matrix:
    python-version: ["3.10", "3.11"]

steps:
  # 1. Baixa o código do seu repositório para a máquina virtual do GitHub
  - uses: actions/checkout@v4

  # 2. Configura a versão correta do Python
  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: ${{ matrix.python-version }}

  # 3. Cria um cache das dependências para deixar o CI muito mais rápido nas próximas execuções
  - name: Cache dependencies
    uses: actions/cache@v3
    with:
      path: ~/.cache/pip
      key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
      restore-keys: |
        ${{ runner.os }}-pip-

  # 4. Instala as dependências do seu projeto
  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  # 5. Roda as validações de estilo (Ruff) e os testes automatizados (Pytest)
  - name: Run lint and tests
    run: |
      python -m pip install ruff pytest
      ruff check .
      pytest -q